name: CI

on:
  push:
    branches: [main, "v1.*"]
  pull_request:
    branches: [main, "v1.*"]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          pip install pytest pyyaml

      - name: Run pre-commit
        run: |
          pip install pre-commit
          pre-commit run --all-files

      - name: Run tests
        run: |
          PYTHONPATH=. pytest --tb=short

      - name: Run LLM expert review evals
        run: |
          python -m evals.runner --eval-id 101 --output-file /tmp/eval-101.json
          python -m evals.runner --eval-id 106 --output-file /tmp/eval-106.json
          python -m evals.runner --eval-id 111 --output-file /tmp/eval-111.json
        continue-on-error: false
