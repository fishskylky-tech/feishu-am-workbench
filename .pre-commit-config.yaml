repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
  - repo: local
    hooks:
      - id: scene-e2e-tests
        name: Scene E2E Tests (dry-run)
        entry: sh -c 'PYTHONPATH=. python -m pytest tests/test_scene_e2e/ -q --collect-only'
        language: system
        pass_filenames: false
        stages: [push]
        description: "Verify scene E2E tests are collectible (requires FEISHU_AM_TEST_LIVE=true to run)"
